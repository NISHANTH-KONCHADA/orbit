# render.yaml — Deploy Orbit backend to Render.com (free tier)
# https://render.com/docs/yaml-spec

services:
  - type: web
    name: orbit-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # set in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_KEY_1
        sync: false
      - key: GEMINI_KEY_2
        sync: false
      - key: GEMINI_KEY_3
        sync: false
      - key: CLIENT_URL
        sync: false   # set to your Vercel URL
